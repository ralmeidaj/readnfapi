services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: extract-nf-app
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      - redis
    networks:
      - extract-nf

  nginx:
    image: nginx:alpine
    container_name: extract-nf-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - extract-nf

  redis:
    image: redis:alpine
    container_name: extract-nf-redis
    ports:
      - "6380:6379"
    networks:
      - extract-nf

networks:
  extract-nf:
    driver: bridge
